<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="geometricPrecision">
  <defs>
    <!-- Fond dégradé sombre -->
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#1a1608"/>
      <stop offset="100%" stop-color="#0a0906"/>
    </radialGradient>
    <!-- Or dégradé pour les éléments principaux -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e0c06a"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <!-- Lueur dorée derrière le livre -->
    <radialGradient id="glow" cx="50%" cy="55%" r="40%">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <!-- Ombre portée douce -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#c9a84c" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect width="32" height="32" rx="6" ry="6" fill="url(#bg)"/>

  <!-- Bordure fine dorée -->
  <rect width="32" height="32" rx="6" ry="6"
        fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Halo de lumière derrière le livre -->
  <ellipse cx="16" cy="19" rx="10" ry="7" fill="url(#glow)"/>

  <!-- ── Livre ouvert ── -->
  <g filter="url(#shadow)">
    <!-- Page gauche -->
    <path d="M5.5 11 C5.5 10.2 6.1 9.6 6.8 9.5 L14.8 8.5 C15.2 8.45 15.5 8.7 15.5 9.1 L15.5 22.5 C15.5 22.9 15.1 23.15 14.7 23.1 L6.3 22.1 C5.85 22.05 5.5 21.65 5.5 21.2 Z"
          fill="url(#gold)" opacity="0.9"/>
    <!-- Ombre/relief page gauche -->
    <path d="M7 10.8 L14 9.9 L14 21.5 L7 20.6 Z"
          fill="#1a1608" opacity="0.18"/>
    <!-- Lignes de texte page gauche -->
    <line x1="8"  y1="12.5" x2="13.5" y2="12"  stroke="#0a0906" stroke-width="0.7" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="8"  y1="14.2" x2="13.5" y2="13.7" stroke="#0a0906" stroke-width="0.7" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="8"  y1="15.9" x2="13.5" y2="15.4" stroke="#0a0906" stroke-width="0.7" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="8"  y1="17.6" x2="11.5" y2="17.2" stroke="#0a0906" stroke-width="0.7" stroke-opacity="0.55" stroke-linecap="round"/>

    <!-- Reliure centrale (ligne de pliure) -->
    <line x1="16" y1="8.2" x2="16" y2="23.3"
          stroke="#c9a84c" stroke-width="0.9" stroke-opacity="0.6" stroke-linecap="round"/>

    <!-- Page droite -->
    <path d="M26.5 11 C26.5 10.2 25.9 9.6 25.2 9.5 L17.2 8.5 C16.8 8.45 16.5 8.7 16.5 9.1 L16.5 22.5 C16.5 22.9 16.9 23.15 17.3 23.1 L25.7 22.1 C26.15 22.05 26.5 21.65 26.5 21.2 Z"
          fill="url(#gold)" opacity="0.9"/>
    <!-- Ombre/relief page droite -->
    <path d="M25 10.8 L18 9.9 L18 21.5 L25 20.6 Z"
          fill="#1a1608" opacity="0.18"/>
    <!-- Lignes de texte page droite -->
    <line x1="18.5" y1="12.5" x2="24" y2="12"  stroke="#0a0906" stroke-width="0.7" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="18.5" y1="14.2" x2="24" y2="13.7" stroke="#0a0906" stroke-width="0.7" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="18.5" y1="15.9" x2="24" y2="15.4" stroke="#0a0906" stroke-width="0.7" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="18.5" y1="17.6" x2="22" y2="17.2" stroke="#0a0906" stroke-width="0.7" stroke-opacity="0.55" stroke-linecap="round"/>
  </g>

  <!-- ── Étoile ✦ en haut à droite ── -->
  <!-- Branches diagonales -->
  <g fill="#c9a84c" opacity="0.95">
    <!-- Branche N -->
    <ellipse cx="22.5" cy="4.5" rx="0.85" ry="2.1" fill="#e0c06a"/>
    <!-- Branche S -->
    <ellipse cx="22.5" cy="4.5" rx="0.85" ry="2.1" transform="rotate(180 22.5 4.5)" fill="#c9a84c" opacity="0.7"/>
    <!-- Branche E -->
    <ellipse cx="22.5" cy="4.5" rx="2.1" ry="0.85" fill="#c9a84c" opacity="0.85"/>
    <!-- Branche diagonale NE -->
    <ellipse cx="22.5" cy="4.5" rx="0.55" ry="1.55" transform="rotate(45 22.5 4.5)" fill="#c9a84c" opacity="0.55"/>
    <!-- Branche diagonale NW -->
    <ellipse cx="22.5" cy="4.5" rx="0.55" ry="1.55" transform="rotate(-45 22.5 4.5)" fill="#c9a84c" opacity="0.55"/>
    <!-- Centre de l'étoile -->
    <circle cx="22.5" cy="4.5" r="0.9" fill="#f0d080"/>
  </g>
</svg>
